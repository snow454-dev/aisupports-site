  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"79101acf-207d-46db-ba90-17cc4c42c961\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<title>MEOローカル集客｜地図検索を、売上に変える。<\u002Ftitle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<link rel=\"stylesheet\" href=\"https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap\">\n<style>\n  html { scroll-behavior: smooth; }\n\n  /* --- responsive --- */\n  *, *::before, *::after { box-sizing: border-box; }\n  img, svg, video { max-width: 100%; height: auto; }\n  body { overflow-x: hidden; }\n  @media (max-width: 900px) {\n    .rwd-stack { grid-template-columns: 1fr !important; gap: 26px !important; }\n    .rwd-pad   { padding: 44px 18px !important; }\n    .rwd-card  { padding: 24px 18px !important; }\n    .rwd-gap   { gap: 26px !important; }\n    section { padding-left: 18px !important; padding-right: 18px !important; }\n  }\n  @media (max-width: 720px) {\n    header nav { display: none !important; }\n    h1 { font-size: clamp(30px, 8.5vw, 42px) !important; line-height: 1.3 !important; }\n    h2 { font-size: clamp(22px, 6.2vw, 30px) !important; line-height: 1.4 !important; }\n    .rwd-abs   { position: static !important; margin: 10px 0 !important; }\n    .rwd-rank  { grid-template-columns: 1fr 46px 32px !important; gap: 6px !important; font-size: 10.5px !important; }\n  }\n  @media (max-width: 480px) { body { font-size: 14.5px; } }\n  body { margin: 0; font-family: 'Noto Sans JP', sans-serif; color: #101828; background: #ffffff; line-height: 1.8; font-size: 15.5px; -webkit-font-smoothing: antialiased; }\n  h1,h2,h3,h4,h5,p,dl,dd,dt,ul,li,figure { margin: 0; padding: 0; }\n  a { color: #4338F0; }\n  a:hover { color: #101828; }\n  input, select, textarea { font-family: 'Noto Sans JP', sans-serif; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- ===== Header ===== -->\n<header data-screen-label=\"ヘッダー\" style=\"position: sticky; top: 0; z-index: 999; background: rgba(255,255,255,.85); backdrop-filter: blur(12px); border-bottom: 1px solid #EAECF0;\">\n  <div style=\"max-width: 1200px; margin: 0 auto; height: 64px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; gap: 20px;\">\n    <a href=\"#top\" style=\"display: flex; align-items: center; gap: 10px; text-decoration: none;\">\n      <span style=\"width: 30px; height: 30px; border-radius: 8px; background: #4338F0; color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px;\">M<\u002Fspan>\n      <span style=\"font-weight: 900; font-size: 16.5px; color: #101828; letter-spacing: .01em;\">MEOローカル集客<\u002Fspan>\n    <\u002Fa>\n    <nav style=\"display: flex; align-items: center; gap: 28px;\">\n      <a href=\"#about\" style=\"font-size: 13.5px; font-weight: 500; color: #475467; text-decoration: none;\">MEOとは<\u002Fa>\n      <a href=\"#features\" style=\"font-size: 13.5px; font-weight: 500; color: #475467; text-decoration: none;\">機能・サポート<\u002Fa>\n      <a href=\"#inbound\" style=\"font-size: 13.5px; font-weight: 500; color: #475467; text-decoration: none;\">インバウンド<\u002Fa>\n      <a href=\"#flow\" style=\"font-size: 13.5px; font-weight: 500; color: #475467; text-decoration: none;\">導入の流れ<\u002Fa>\n      <a href=\"#faq\" style=\"font-size: 13.5px; font-weight: 500; color: #475467; text-decoration: none;\">FAQ<\u002Fa>\n      <a href=\"#contact\" style=\"font-size: 13.5px; font-weight: 700; color: #fff; background: #4338F0; border-radius: 8px; padding: 9px 20px; text-decoration: none; transition: background .2s ease;\" style-hover=\"background: #101828; color: #fff;\">資料請求<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ===== Hero ===== -->\n<section id=\"top\" data-screen-label=\"ヒーロー\" style=\"position: relative; overflow: hidden; background: #FAFAFF; border-bottom: 1px solid #EAECF0;\">\n  <div aria-hidden=\"true\" style=\"position: absolute; inset: 0; background-image: linear-gradient(#EAECF5 1px, transparent 1px), linear-gradient(90deg, #EAECF5 1px, transparent 1px); background-size: 44px 44px; mask-image: linear-gradient(180deg, rgba(0,0,0,.7), transparent 70%);\"><\u002Fdiv>\n  <div style=\"max-width: 1200px; margin: 0 auto; padding: 88px 24px 96px; position: relative; display: grid; grid-template-columns: 1.05fr .95fr; gap: 56px; align-items: center;\">\n    <div>\n      <p style=\"display: inline-flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #EAECF0; border-radius: 999px; padding: 6px 14px; font-size: 12.5px; font-weight: 700; color: #4338F0; margin-bottom: 26px;\"><span style=\"width: 7px; height: 7px; border-radius: 999px; background: #C6F04D;\"><\u002Fspan>北海道の店舗ビジネス専門のMEO運用サービス<\u002Fp>\n      <h1 style=\"font-weight: 900; font-size: clamp(34px, 4.2vw, 54px); line-height: 1.32; letter-spacing: -0.01em; color: #101828;\">地図検索を、<br><span style=\"color: #4338F0;\">売上に変える。<\u002Fspan><\u002Fh1>\n      <p style=\"margin-top: 22px; max-width: 30em; font-size: 16px; color: #475467; line-height: 1.9;\">「近くのお店」を探す人の行き先は、Googleマップで決まります。<\u002Fp>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 12px; margin-top: 34px;\">\n        <a href=\"#contact\" style=\"display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15.5px; color: #fff; background: #4338F0; border-radius: 10px; padding: 15px 30px; text-decoration: none; box-shadow: 0 8px 24px rgba(67,56,240,.28); transition: background .2s ease;\" style-hover=\"background: #101828; color: #fff;\">資料をダウンロード（無料）<span style=\"font-family: 'Space Grotesk', sans-serif;\">→<\u002Fspan><\u002Fa>\n        <a href=\"#about\" style=\"display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15.5px; color: #101828; background: #fff; border: 1px solid #D0D5DD; border-radius: 10px; padding: 15px 30px; text-decoration: none; transition: border-color .2s ease;\" style-hover=\"border-color: #101828; color: #101828;\">MEOとは？<\u002Fa>\n      <\u002Fdiv>\n      <p style=\"margin-top: 16px; font-size: 12.5px; color: #667085;\">料金プランは資料内でご案内します／しつこい営業はいたしません<\u002Fp>\n    <\u002Fdiv>\n    <!-- Dashboard mock -->\n    <div aria-hidden=\"true\" style=\"position: relative;\">\n      <div style=\"background: #fff; border: 1px solid #EAECF0; border-radius: 16px; box-shadow: 0 24px 60px rgba(16,24,40,.12); overflow: hidden;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #EAECF0;\">\n          <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: .14em; color: #667085;\">RANK TRACKER<\u002Fp>\n          <span style=\"font-size: 11px; font-weight: 700; color: #3D7A24; background: #EDFAD8; border-radius: 999px; padding: 3px 10px;\">今週 +12.4%<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding: 18px;\">\n          <div style=\"display: grid; gap: 10px;\">\n            <sc-for list=\"{{ ranks }}\" as=\"rk\" hint-placeholder-count=\"4\">\n              <div style=\"display: flex; align-items: center; gap: 14px; border: 1px solid #F2F4F7; border-radius: 10px; padding: 12px 14px;\">\n                <span style=\"width: 34px; height: 34px; border-radius: 8px; background: {{ rk.bg }}; color: {{ rk.fg }}; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px; flex-shrink: 0;\">{{ rk.pos }}<\u002Fspan>\n                <div style=\"flex: 1; min-width: 0;\">\n                  <p style=\"font-size: 13px; font-weight: 700; color: #101828; line-height: 1.4;\">{{ rk.kw }}<\u002Fp>\n                  <p style=\"font-size: 11px; color: #667085; line-height: 1.5;\">{{ rk.area }}<\u002Fp>\n                <\u002Fdiv>\n                <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 12.5px; font-weight: 600; color: {{ rk.deltaColor }};\">{{ rk.delta }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;\">\n            <div style=\"background: #FAFAFF; border: 1px solid #EAECF0; border-radius: 10px; padding: 12px 14px;\">\n              <p style=\"font-size: 11px; color: #667085;\">経路検索<\u002Fp>\n              <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #101828;\">1,284<span style=\"font-size: 12px; color: #3D7A24;\"> ↑18%<\u002Fspan><\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background: #FAFAFF; border: 1px solid #EAECF0; border-radius: 10px; padding: 12px 14px;\">\n              <p style=\"font-size: 11px; color: #667085;\">電話タップ<\u002Fp>\n              <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: #101828;\">312<span style=\"font-size: 12px; color: #3D7A24;\"> ↑9%<\u002Fspan><\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position: absolute; top: -18px; right: -14px; background: #101828; color: #fff; border-radius: 12px; padding: 12px 18px; box-shadow: 0 12px 30px rgba(16,24,40,.3);\">\n        <p style=\"font-size: 10.5px; color: #98A2B3; letter-spacing: .1em; font-family: 'Space Grotesk', sans-serif;\">MAP VIEWS<\u002Fp>\n        <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; line-height: 1.3;\">24,908<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- ===== Stats band ===== -->\n<section data-screen-label=\"実績\" style=\"background: #101828; color: #fff; padding: 56px 24px;\">\n  <div style=\"max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: auto 1fr; gap: 48px; align-items: center;\">\n    <p style=\"font-weight: 900; font-size: clamp(18px, 2vw, 24px); line-height: 1.6; max-width: 13em;\">数字で選ばれる、<br>MEOローカル集客。<\u002Fp>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;\">\n      <sc-for list=\"{{ stats }}\" as=\"st\" hint-placeholder-count=\"3\">\n        <div style=\"border-left: 1px solid #344054; padding-left: 24px;\">\n          <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(32px, 3.4vw, 44px); line-height: 1.2; color: #C6F04D;\">{{ st.value }}<span style=\"font-size: 18px; color: #98A2B3;\">{{ st.unit }}<\u002Fspan><\u002Fp>\n          <p style=\"font-size: 13.5px; font-weight: 700; margin-top: 8px;\">{{ st.label }}<\u002Fp>\n          <p style=\"font-size: 11.5px; color: #98A2B3; margin-top: 2px;\">{{ st.note }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== MEOとは ===== -->\n<section id=\"about\" data-screen-label=\"MEOとは\" style=\"padding: 96px 24px; background: #ffffff;\">\n  <div style=\"max-width: 1200px; margin: 0 auto;\">\n    <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: .18em; color: #4338F0; margin-bottom: 14px;\">WHAT IS MEO<\u002Fp>\n    <h2 style=\"font-weight: 900; font-size: clamp(26px, 3vw, 38px); line-height: 1.4; letter-spacing: -0.01em; max-width: 22em;\">MEOとは、Googleマップで<br>「選ばれる状態」をつくる施策です。<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 56px; margin-top: 40px; align-items: start;\">\n      <p style=\"font-size: 15.5px; color: #475467; line-height: 2;\">「近くの美容室」「札幌 ランチ」——こうした検索の結果に表示される地図枠が、いま店舗集客の最大の入口です。MEO（マップエンジン最適化）は、この地図枠でお店を上位に・魅力的に表示させる取り組みのこと。来店意欲の高いユーザーに直接届くため、広告よりも費用対効果が高いのが特長です。<br><br>ただし成果には、プロフィール整備・写真や投稿の更新・口コミ返信・順位計測といった<strong style=\"color: #101828;\">継続的な運用<\u002Fstrong>が不可欠。私たちはその運用を丸ごと代行します。<\u002Fp>\n      <div style=\"display: grid; gap: 14px;\">\n        <sc-for list=\"{{ pillars }}\" as=\"pl\" hint-placeholder-count=\"3\">\n          <div style=\"display: flex; gap: 16px; align-items: flex-start; background: #FAFAFF; border: 1px solid #EAECF0; border-radius: 12px; padding: 20px 22px;\">\n            <span style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; color: #4338F0; background: #EEEDFE; border-radius: 8px; padding: 6px 10px; flex-shrink: 0;\">{{ pl.no }}<\u002Fspan>\n            <div>\n              <h3 style=\"font-weight: 700; font-size: 15.5px; color: #101828; margin-bottom: 4px;\">{{ pl.title }}<\u002Fh3>\n              <p style=\"font-size: 13.5px; color: #475467; line-height: 1.8;\">{{ pl.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== プラットフォームツアー（スクロール連動） ===== -->\n<section id=\"features\" data-screen-label=\"プラットフォームツアー\" style=\"background: #0C111D; position: relative;\">\n  <div ref=\"{{ tourRef }}\" style=\"height: 520vh; position: relative;\">\n    <div style=\"position: sticky; top: 0; height: 100vh; display: flex; align-items: center; overflow-y: auto; overflow-x: hidden;\">\n      <div aria-hidden=\"true\" style=\"position: absolute; inset: 0; background: radial-gradient(900px 500px at 80% 20%, rgba(67,56,240,.25), transparent 60%), radial-gradient(700px 400px at 10% 90%, rgba(198,240,77,.08), transparent 60%);\"><\u002Fdiv>\n      <div style=\"max-width: 1200px; margin: auto; width: 100%; padding: 28px 24px; position: relative; display: grid; grid-template-columns: .9fr 1.1fr; gap: 64px; align-items: center;\">\n        <!-- Left: steps -->\n        <div>\n          <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: .18em; color: #C6F04D; margin-bottom: 16px;\">PLATFORM TOUR<\u002Fp>\n          <h2 style=\"font-weight: 900; font-size: clamp(22px, min(3vw, 4.5vh), 38px); line-height: 1.45; color: #fff; margin-bottom: clamp(14px, 3vh, 36px);\">30秒で知れる、<br>MEOローカル集客の機能。<\u002Fh2>\n          <div style=\"display: grid; gap: 6px;\">\n            <sc-for list=\"{{ tourSteps }}\" as=\"ts\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ ts.go }}\" style=\"text-align: left; background: {{ ts.bg }}; border: 1px solid {{ ts.border }}; border-radius: 14px; padding: clamp(10px, 1.8vh, 18px) 20px; cursor: pointer; transition: background .4s ease, border-color .4s ease; display: grid; gap: 4px;\">\n                <span style=\"display: flex; align-items: center; gap: 12px;\">\n                  <span style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 12px; color: {{ ts.noColor }};\">{{ ts.no }}<\u002Fspan>\n                  <span style=\"font-weight: 700; font-size: 16px; color: {{ ts.titleColor }};\">{{ ts.title }}<\u002Fspan>\n                <\u002Fspan>\n                <span style=\"font-size: 13px; color: #98A2B3; line-height: 1.8; opacity: {{ ts.bodyOp }}; max-height: {{ ts.bodyMax }}; overflow: hidden; transition: opacity .4s ease, max-height .5s ease;\">{{ ts.body }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Right: visuals -->\n        <div style=\"position: relative; height: 520px;\">\n          <!-- Scene 1: 口コミが集まる導線設計 -->\n          <div style=\"position: absolute; inset: 0; opacity: {{ sceneA.op }}; transform: translateY({{ sceneA.ty }}px); transition: opacity .55s ease, transform .55s ease; pointer-events: none;\">\n            <div style=\"background: #fff; border-radius: 18px; padding: 28px; box-shadow: 0 32px 80px rgba(0,0,0,.45); max-width: 480px; margin: 30px auto 0;\">\n              <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: .14em; colo    <div style=\"position: absolute; inset: 0; opacity: {{ sceneB.op }}; transform: translateY({{ sceneB.ty }}px); transition: opacity .55s ease, transform .55s ease; pointer-events: none;\">\n            <div style=\"background: #fff; border-radius: 18px; padding: 26px 28px; box-shadow: 0 32px 80px rgba(0,0,0,.45); max-width: 480px; margin: 30px auto 0;\">\n              <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: .14em; color: #667085; margin-bottom: 16px;\">AI KEYWORD ANALYSIS<\u002Fp>\n              <div style=\"display: flex; gap: 8px; font-size: 12px; color: #475467; margin-bottom: 14px;\">\n                <span style=\"border-bottom: 2px solid #4338F0; color: #4338F0; font-weight: 700; padding-bottom: 6px;\">キーワード別<\u002Fspan>\n                <span style=\"padding-bottom: 6px;\">エリア別<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: grid; grid-template-columns: 1fr 70px 50px; gap: 8px; font-size: 11px; color: #98A2B3; padding: 0 4px 8px;\">\n                <span>キーワード<\u002Fspan><span style=\"text-align: right;\">検索数<\u002Fspan><span style=\"text-align: right;\">難易度<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: grid; gap: 8px;\">\n                <div style=\"display: grid; grid-template-columns: 1fr 70px 50px; align-items: center; border: 1px solid #F2F4F7; border-radius: 10px; padding: 12px 14px;\">\n                  <span style=\"font-size: 13px; font-weight: 700; color: #101828;\">札幌 エステ<\u002Fspan><span style=\"text-align: right; font-family: 'Space Grotesk', sans-serif; font-size: 12.5px; color: #475467;\">4,750<\u002Fspan><span style=\"text-align: right; font-size: 11px; color: #3D7A24; font-weight: 700;\">32<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display: grid; grid-template-columns: 1fr 70px 50px; align-items: center; border: 1px solid #F2F4F7; border-radius: 10px; padding: 12px 14px;\">\n display: grid; gap: 8px;\">\n            <sc-for list=\"{{ tourDots }}\" as=\"d\" hint-placeholder-count=\"4\">\n              <span style=\"width: 6px; height: {{ d.h }}px; border-radius: 999px; background: {{ d.bg }}; transition: all .4s ease;\"><\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== 業種バンド ===== -->\n<section data-screen-label=\"対応業種\" style=\"background: #ffffff; border-bottom: 1px solid #EAECF0; padding: 28px 24px;\">\n  <div style=\"max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center;\">\n    <span style=\"font-size: 13px; font-weight: 700; color: #475467; margin-right: 8px;\">対応業種<\u002Fspan>\n    <sc-for list=\"{{ industries }}\" as=\"ind\" hint-placeholder-count=\"5\">\n      <span style=\"display: inline-flex; background: #FAFAFF; border: 1px solid #D0D5DD; color: #101828; border-radius: 999px; padding: 6px 16px; font-size: 12.5px; font-weight: 500;\">{{ ind }}<\u002Fspan>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== インバウンド（データ） ===== -->\n<section id=\"inbound\" data-screen-label=\"インバウンド\" style=\"padding: 96px 24px; background: #ffffff; border-bottom: 1px solid #EAECF0;\">\n  <div style=\"max-width: 1200px; margin: 0 auto;\">\n    <div style=\"display: grid; grid-template-columns: 1fr; gap: 32px; justify-items: center; text-align: center; margin-bottom: 48px;\">\n      <div>\n        <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: .18em; color: #4338F0; margin-bottom: 14px;\">INBOUND × HOKKAIDO<\u002Fp>\n        <h2 style=\"font-weight: 900; font-size: clamp(26px, 3vw, 38px); line-height: 1.45; letter-spacing: -0.01em;\">北海道のインバウンドは、<br>「情報の受け皿」で決まる。<\u002Fh2>\n      <\u002Fdiv>\n      <div id=\"inboundFlip\"><div class=\"flip-stage\"><div class=\"flip-card\"><img src=\"\u002Fmeo\u002Fmeo_inbound1.png\" alt=\"SNSで北海道を知る\" loading=\"lazy\" decoding=\"async\" width=\"1456\" height=\"1092\"><\u002Fdiv><div class=\"flip-card\"><img src=\"\u002Fmeo\u002Finbound2.png\" alt=\"興味ある分野を地図から調べる\" loading=\"lazy\" decoding=\"async\" width=\"1456\" height=\"1092\"><\u002Fdiv><div class=\"flip-card\"><img src=\"\u002Fmeo\u002Finbound3.png\" alt=\"日本語表記だけで候補から外れてしまう\" loading=\"lazy\" decoding=\"async\" width=\"1456\" height=\"1092\"><\u002Fdiv><div class=\"flip-card\"><img src=\"\u002Fmeo\u002Finbound4.png\" alt=\"英語表記があり来店に繋がる\" loading=\"lazy\" decoding=\"async\" width=\"1456\" height=\"1092\"><\u002Fdiv><\u002Fdiv><div class=\"flip-dots\"><span class=\"flip-dot\"><\u002Fdiv><span class=\"flip-dot\"><\u002Fdiv><span class=\"flip-dot\"><\u002Fdiv><span class=\"flip-dot\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;\">\n      <div style=\"background: #FAFAFF; border: 1px solid #EAECF0; border-radius: 14px; padding: 30px 28px;\">\n        <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(34px, 3.4vw, 46px); line-height: 1.15; color: #4338F0;\">8<span style=\"font-size: 20px; color: #667085;\">割以上<\u002Fspan><\u002Fp>\n        <p style=\"font-size: 14px; font-weight: 700; color: #101828; margin-top: 10px;\">「大都市以外の地方を訪れたい」東アジア・東南アジアの旅行者<\u002Fp>\n        <p style=\"font-size: 12px; color: #667085; margin-top: 6px; line-height: 1.7;\">地方への関心はすでに高い。足りないのは情報です。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background: #FAFAFF; border: 1px solid #EAECF0; border-radius: 14px; padding: 30px 28px;\">\n        <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(34px, 3.4vw, 46px); line-height: 1.15; color: #4338F0;\">5.9<span style=\"font-size: 20px; color: #667085;\">%<\u002Fspan><\u002Fp>\n        <p style=\"font-size: 14px; font-weight: 700; color: #101828; margin-top: 10px;\">道東3圏域の外国人宿泊シェア（道内全体比）<\u002Fp>\n        <p style=\"font-size: 12px; color: #667085; margin-top: 6px; line-height: 1.7;\">道央圏に71.7%が集中。情報が届けば、まだ伸ばせる余地があります。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background: #FAFAFF; border: 1px solid #EAECF0; border-radius: 14px; padding: 30px 28px;\">\n        <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(34px, 3.4vw, 46px); line-height: 1.15; color: #4338F0;\">38.3<span style=\"font-size: 20px; color: #667085;\">万円/人<\u002Fspan><\u002Fp>\n        <p style=\"font-size: 14px; font-weight: 700; color: #101828; margin-top: 10px;\">英国旅行者の1人あたり旅行支出（豪38.2・米33.2万円）<\u002Fp>\n        <p style=\"font-size: 12px; color: #667085; margin-top: 6px; line-height: 1.7;\">台湾18.8万円・韓国10.9万円の約2〜3倍。英語圏対応の価値は大きい。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top: 28px; background: #FAFAFF; border: 1px solid #EAECF0; border-radius: 14px; padding: 24px 30px; display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap;\">\n      <div>\n        <p style=\"font-size: 14px; font-weight: 700; color: #101828; margin-bottom: 4px;\">旅行者539件の「旅行前の質問」のうち63%は、旅程・交通・季節などの前提情報でした。<\u002Fp>\n        <p style=\"font-size: 12px; color: #667085; line-height: 1.7;\">出典：My Eastern Hokkaido「北海道に行きたい外国人旅行者はなぜ道東を選ばないのか」（2026）、観光庁・JNTO・北海道庁各種統計<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"#contact\" style=\"flex-shrink: 0; font-weight: 700; font-size: 14px; color: #fff; background: #4338F0; border-radius: 10px; padding: 13px 26px; text-decoration: none; transition: background .2s ease;\" style-hover=\"background: #101828; color: #fff;\">インバウンド対応の詳細資料 →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== 導入の流れ ===== -->\n<section id=\"flow\" data-screen-label=\"導入の流れ\" style=\"padding: 96px 24px; background: #ffffff;\">\n  <div style=\"max-width: 1200px; margin: 0 auto;\">\n    <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: .18em; color: #4338F0; margin-bottom: 14px;\">HOW IT WORKS<\u002Fp>\n    <h2 style=\"font-weight: 900; font-size: clamp(26px, 3vw, 38px); line-height: 1.4; letter-spacing: -0.01em; margin-bottom: 12px;\">最短2週間で、運用スタート。<\u002Fh2>\n    <p style=\"font-size: 14px; color: #667085; margin-bottom: 44px;\">難しい作業はすべて私たちが引き受けます。<\u002Fp>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 0; border: 1px solid #EAECF0; border-radius: 14px; overflow: hidden;\">\n      <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"padding: 30px 26px; border-right: 1px solid #EAECF0; background: #fff;\">\n          <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; color: #4338F0; margin-bottom: 14px;\">STEP {{ s.no }}<\u002Fp>\n          <h3 style=\"font-weight: 700; font-size: 16px; color: #101828; margin-bottom: 8px;\">{{ s.title }}<\u002Fh3>\n          <p style=\"font-size: 13px; color: #475467; line-height: 1.8;\">{{ s.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-top: 24px; background: #101828; border-radius: 14px; padding: 26px 30px; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap;\">\n      <div>\n        <h4 style=\"font-weight: 700; font-size: 16px; color: #fff;\">料金プランについて<\u002Fh4>\n        <p style=\"font-size: 13px; color: #98A2B3; line-height: 1.8;\">店舗数・業種に合わせた複数プランをご用意。詳しい料金表は資料請求後にお送りします。<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"#contact\" style=\"flex-shrink: 0; font-weight: 700; font-size: 14px; color: #101828; background: #C6F04D; border-radius: 10px; padding: 13px 26px; text-decoration: none; transition: opacity .2s ease;\" style-hover=\"opacity: .85; color: #101828;\">料金つき資料を請求 →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== FAQ ===== -->\n<section id=\"faq\" data-screen-label=\"FAQ\" style=\"padding: 96px 24px; background: #FAFAFF; border-top: 1px solid #EAECF0;\">\n  <div style=\"max-width: 820px; margin: 0 auto;\">\n    <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: .18em; color: #4338F0; margin-bottom: 14px; text-align: center;\">FAQ<\u002Fp>\n    <h2 style=\"font-weight: 900; font-size: clamp(26px, 3vw, 38px); line-height: 1.4; text-align: center; margin-bottom: 44px;\">よくある質問<\u002Fh2>\n    <div style=\"display: grid; gap: 12px;\">\n      <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"4\">\n        <div style=\"border: 1px solid #EAECF0; border-radius: 12px; background: #fff; overflow: hidden;\">\n          <button onclick=\"{{ f.toggle }}\" style=\"width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 16px; background: none; border: none; cursor: pointer; padding: 18px 22px; text-align: left;\">\n            <span style=\"font-weight: 700; font-size: 15px; color: #101828; line-height: 1.6;\">{{ f.q }}<\u002Fspan>\n            <span style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; color: #4338F0; font-size: 18px; flex-shrink: 0;\">{{ f.mark }}<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"padding: 0 22px 20px; font-size: 13.5px; color: #475467; line-height: 1.9;\">{{ f.a }}<\u002Fp>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== 資料請求 ===== -->\n<section id=\"contact\" data-screen-label=\"資料請求\" style=\"padding: 96px 24px; background: #101828;\">\n  <div style=\"max-width: 1080px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;\">\n    <div style=\"color: #fff;\">\n      <p style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: .18em; color: #C6F04D; margin-bottom: 16px;\">GET THE GUIDE<\u002Fp>\n      <h2 style=\"font-weight: 900; font-size: clamp(26px, 3vw, 38px); line-height: 1.45;\">まずは資料で、<br>じっくりご検討ください。<\u002Fh2>\n      <p style=\"margin-top: 18px; font-size: 14.5px; color: #98A2B3; line-height: 1.9;\">サービス内容・料金プラン・業種別事例をまとめた資料を無料でお送りします。フォーム送信後、すぐにメールでお届けします。<\u002Fp>\n      <ul style=\"list-style: none; margin-top: 22px; display: grid; gap: 10px; font-size: 14px; color: #EAECF0;\">\n        <li style=\"display: flex; gap: 10px; align-items: center;\"><span style=\"width: 18px; height: 18px; border-radius: 999px; background: #C6F04D; color: #101828; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0;\">✓<\u002Fspan>料金プラン一覧つき<\u002Fli>\n        <li style=\"display: flex; gap: 10px; align-items: center;\"><span style=\"width: 18px; height: 18px; border-radius: 999px; background: #C6F04D; color: #101828; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0;\">✓<\u002Fspan>業種別の活用事例つき<\u002Fli>\n        <li style=\"display: flex; gap: 10px; align-items: center;\"><span style=\"width: 18px; height: 18px; border-radius: 999px; background: #C6F04D; color: #101828; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0;\">✓<\u002Fspan>しつこい営業は行いません<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div style=\"background: #fff; border-radius: 16px; padding: 40px 36px; box-shadow: 0 24px 60px rgba(0,0,0,.35);\">\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <form id=\"meoContactForm\" style=\"display: grid; gap: 16px;\">\n          <label style=\"display: grid; gap: 6px;\">\n            <span style=\"font-size: 12.5px; font-weight: 700; color: #101828;\">会社名・店舗名 <em style=\"font-style: normal; color: #4338F0; font-size: 11px;\">必須<\u002Fem><\u002Fspan>\n            <input required=\"\" name=\"company\" type=\"text\" placeholder=\"例）〇〇美容室\" style=\"border: 1px solid #D0D5DD; border-radius: 8px; padding: 11px 14px; font-size: 14px; color: #101828; outline-color: #4338F0;\">\n          <\u002Flabel>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n            <label style=\"display: grid; gap: 6px;\">\n              <span style=\"font-size: 12.5px; font-weight: 700; color: #101828;\">お名前 <em style=\"font-style: normal; color: #4338F0; font-size: 11px;\">必須<\u002Fem><\u002Fspan>\n              <input required=\"\" name=\"name\" type=\"text\" placeholder=\"例）山田 太郎\" style=\"border: 1px solid #D0D5DD; border-radius: 8px; padding: 11px 14px; font-size: 14px; color: #101828; outline-color: #4338F0;\">\n            <\u002Flabel>\n            <label style=\"display: grid; gap: 6px;\">\n              <span style=\"font-size: 12.5px; font-weight: 700; color: #101828;\">業種<\u002Fspan>\n              <select name=\"industry\" style=\"border: 1px solid #D0D5DD; border-radius: 8px; padding: 11px 12px; font-size: 14px; color: #101828; background: #fff; outline-color: #4338F0;\">\n                <option>飲食店<\u002Foption>\n                <option>美容室・サロン<\u002Foption>\n                <option>クリニック・医院<\u002Foption>\n                <option>小売店<\u002Foption>\n                <option>士業・オフィス系<\u002Foption>\n                <option>その他<\u002Foption>\n              <\u002Fselect>\n            <\u002Flabel>\n          <\u002Fdiv>\n          <label style=\"display: grid; gap: 6px;\">\n            <span style=\"font-size: 12.5px; font-weight: 700; color: #101828;\">メールアドレス <em style=\"font-style: normal; color: #4338F0; font-size: 11px;\">必須<\u002Fem><\u002Fspan>\n            <input required=\"\" name=\"email\" type=\"email\" placeholder=\"例）info@example.com\" style=\"border: 1px solid #D0D5DD; border-radius: 8px; padding: 11px 14px; font-size: 14px; color: #101828; outline-color: #4338F0;\">\n          <\u002Flabel>\n          <label style=\"display: grid; gap: 6px;\">\n            <span style=\"font-size: 12.5px; font-weight: 700; color: #101828;\">ご相談内容<\u002Fspan>\n            <textarea required=\"\" name=\"message\" rows=\"3\" placeholder=\"現在の集客のお悩みなど、お気軽にどうぞ\" style=\"border: 1px solid #D0D5DD; border-radius: 8px; padding: 11px 14px; font-size: 14px; color: #101828; resize: vertical; outline-color: #4338F0;\"><\u002Ftextarea>\n          <\u002Flabel>\n          <button type=\"submit\" style=\"font-weight: 700; font-size: 15.5px; color: #fff; background: #4338F0; border: none; border-radius: 10px; padding: 15px 30px; cursor: pointer; transition: background .2s ease;\" style-hover=\"background: #101828;\">資料を請求する（無料） →<\u002Fbutton>\n          <p style=\"font-size: 11px; color: #667085; text-align: center;\">送信いただいた情報は資料送付とご連絡のみに使用します。<\u002Fp>\n        <\u002Fform>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 14px; min-height: 360px;\">\n          <span style=\"width: 52px; height: 52px; border-radius: 999px; background: #EEEDFE; color: #4338F0; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700;\">✓<\u002Fspan>\n          <h3 style=\"font-weight: 900; font-size: 22px; color: #101828;\">ありがとうございます！<\u002Fh3>\n          <p style=\"font-size: 14px; color: #475467; line-height: 1.9;\">資料請求を受け付けました。<br>ご入力いただいたメールアドレス宛に、まもなく資料をお送りします。<\u002Fp>\n          <button onclick=\"{{ resetForm }}\" style=\"font-weight: 700; font-size: 13px; color: #101828; background: #fff; border: 1px solid #D0D5DD; border-radius: 8px; padding: 9px 22px; cursor: pointer;\">フォームに戻る<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===== Footer ===== -->\n<footer data-screen-label=\"フッター\" style=\"background: #101828; color: #98A2B3; border-top: 1px solid #344054; padding: 36px 24px;\">\n  <div style=\"max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;\">\n    <div style=\"display: flex; align-items: center; gap: 10px;\">\n      <span style=\"width: 26px; height: 26px; border-radius: 7px; background: #4338F0; color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px;\">M<\u002Fspan>\n      <span style=\"font-weight: 900; font-size: 14.5px; color: #fff;\">MEOローカル集客<\u002Fspan>\n    <\u002Fdiv>\n    <nav style=\"display: flex; gap: 22px; flex-wrap: wrap;\">\n      <a href=\"#about\" style=\"font-size: 12.5px; color: #98A2B3; text-decoration: none;\">MEOとは<\u002Fa>\n      <a href=\"#features\" style=\"font-size: 12.5px; color: #98A2B3; text-decoration: none;\">機能・サポート<\u002Fa>\n      <a href=\"#flow\" style=\"font-size: 12.5px; color: #98A2B3; text-decoration: none;\">導入の流れ<\u002Fa>\n      <a href=\"#faq\" style=\"font-size: 12.5px; color: #98A2B3; text-decoration: none;\">FAQ<\u002Fa>\n      <a href=\"#contact\" style=\"font-size: 12.5px; color: #98A2B3; text-decoration: none;\">資料請求<\u002Fa>\n    <\u002Fnav>\n    <p style=\"font-family: 'Space Grotesk', sans-serif; font-size: 11.5px; letter-spacing: .06em;\">© 2026 AISupports — 画面はイメージです。効果は立地・業種・競合状況により異なります。<\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{}\">\nclass Component extends DCLogic {\n  state = { submitted: false, openFaq: 0, scene: 0 };\n\n  componentDidMount() {\n    this._onScroll = () => {\n      const el = this._tourEl;\n      if (!el) return;\n      const rect = el.getBoundingClientRect();\n      const vh = window.innerHeight;\n      const total = rect.height - vh;\n      const progress = Math.min(1, Math.max(0, -rect.top / total));\n      const scene = Math.min(4, Math.floor(progress * 5));\n      if (scene !== this.state.scene) this.setState({ scene });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n  }\n\n  _goScene(i) {\n    const el = this._tourEl;\n    if (!el) return;\n    const top = el.getBoundingClientRect().top + window.scrollY;\n    const seg = (el.offsetHeight - window.innerHeight) / 5;\n    window.scrollTo({ top: top + seg * i + seg * 0.5, behavior: 'smooth' });\n  }\n\n  renderVals() {\n    const scene = this.state.scene;\n    const tourData = [\n      { no: '01', title: '口コミが集まる導線設計', body: 'Googleのポリシーに準拠した方法で、来店客が自然に口コミを残したくなる導線を設計。店頭掲示・QR・声かけスクリプトまで含めて運用を支援します。報酬提供やbotによる投稿は一切行いません。' },\n      { no: '02', title: 'AIキーワード分析', body: '対策中キーワードや最適キーワードをAIが毎月分析・更新。管理画面でお知らせし、改善の打ち手を継続的にご提案します。' },\n      { no: '03', title: 'ワンタップデータ確認', body: '管理画面で毎月のデータや伸び率、指定の口コミ文章や画像などをワンタップで確認・設定できます。' },\n      { no: '04', title: '実測データの可視化', body: '表示回数・経路検索・電話タップなど、Googleが提供する実測データを管理画面で確認できます。売上への寄与は店舗側の実績と突き合わせて検証します。' },\n      { no: '05', title: 'メディアをゼロから制作', body: '店舗専用のブログメディアをゼロから制作し、店舗情報を発信。通常数十万円するメディア制作費も料金に含まれます。' },\n      { no: '06', title: 'インバウンド対策', body: '英語メニュー・多言語プロフィール・海外旅行者の検索行動に合わせた情報整備まで対応。北海道を訪れる外国人旅行者の来店導線を設計します。' },\n    ];\n    const mkScene = (i) => ({ op: scene === i ? 1 : 0, ty: scene === i ? 0 : (scene > i ? -26 : 26) });\n    const faqsData = [\n      ['本当に効果はありますか？', '立地・業種・競合状況によりますが、多くの店舗で3ヶ月以内に地図経由のアクセス増加を実感いただいています。無理なお約束はせず、事前調査で見込みを正直にお伝えします。'],\n      ['お店側の作業はありますか？', '基本的な運用はすべて代行します。お願いするのは初回ヒアリングと、新メニューやイベントなどの情報共有だけです。'],\n      ['契約期間の縛りはありますか？', '最低契約期間は1年間とさせていただいています。MEOは口コミやプロフィールの評価が積み上がるまでに時間がかかり、せっかく評価され始めても短期間で解約されると効果が続きません。継続的に成果を積み上げる仕組みが定着するまでの期間として設けています。'],\n      ['Googleビジネスプロフィールを未登録でも大丈夫？', '問題ありません。登録・オーナー確認の代行からサポートしますので、ゼロからでも始められます。'],\n      ['複数店舗でも依頼できますか？', 'はい。複数店舗向けの割引プランもご用意しています。店舗数をフォームにご記入ください。'],\n    ];\n    return {\n      tourRef: (el) => { this._tourEl = el; },\n      tourSteps: tourData.map((t, i) => ({\n        ...t,\n        go: () => this._goScene(i),\n        bg: scene === i ? 'rgba(255,255,255,.06)' : 'transparent',\n        border: scene === i ? 'rgba(198,240,77,.4)' : 'rgba(255,255,255,.08)',\n        noColor: scene === i ? '#C6F04D' : '#667085',\n        titleColor: scene === i ? '#ffffff' : '#98A2B3',\n        bodyOp: scene === i ? 1 : 0,\n        bodyMax: scene === i ? '120px' : '0px',\n      })),\n      sceneA: mkScene(0),\n      sceneB: mkScene(1),\n      sceneC: mkScene(2),\n      sceneD: mkScene(3),\n      sceneE: mkScene(4),\n      tourDots: [0, 1, 2, 3, 4].map((i) => ({\n        h: scene === i ? 26 : 6,\n        bg: scene === i ? '#C6F04D' : 'rgba(255,255,255,.25)',\n      })),\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      onSubmit: (e) => { e.preventDefault(); this.setState({ submitted: true }); },\n      resetForm: () => this.setState({ submitted: false }),\n      ranks: [\n        { pos: '1', bg: '#101828', fg: '#C6F04D', kw: '札幌 美容室', area: '北海道札幌市・半径3km', delta: '+4', deltaColor: '#3D7A24' },\n        { pos: '2', bg: '#EEEDFE', fg: '#4338F0', kw: '近くのカフェ', area: '北海道小樽市・半径1km', delta: '+2', deltaColor: '#3D7A24' },\n        { pos: '3', bg: '#EEEDFE', fg: '#4338F0', kw: '内科 クリニック', area: '北海道函館市・半径3km', delta: '+7', deltaColor: '#3D7A24' },\n        { pos: '6', bg: '#F2F4F7', fg: '#475467', kw: '整体 おすすめ', area: '北海道帯広市・半径5km', delta: '−1', deltaColor: '#B42318' },\n      ],\n      stats: [\n        { value: '100', unit: '%', label: '北海道特化', note: '道内店舗の商圏・competitor事情を熟知' },\n        { value: '1,200', unit: '店舗+', label: '累計サポート店舗数', note: '北海道全域・5業種以上' },\n        { value: '97.1', unit: '%', label: 'ご契約継続率', note: '直近12ヶ月の平均' },\n      ],\n      pillars: [\n        { no: '01', title: '来店直前のユーザーに届く', body: '「近くの〇〇」検索は来店意欲がもっとも高い瞬間。広告より自然に、選ばれる導線をつくります。' },\n        { no: '02', title: '低コストで始められる', body: 'Googleビジネスプロフィール自体は無料。大きな広告費をかけずに集客の土台が育ちます。' },\n        { no: '03', title: '成果が数字で見える', body: '表示回数・経路検索・電話数がデータで見えるので、効果を確認しながら改善できます。' },\n      ],\n      features: [\n        { en: 'PROFILE', title: 'プロフィール最適化', body: '営業時間・カテゴリ・属性・写真まで、検索アルゴリズムと来店者の両方に響く形へ整備します。' },\n        { en: 'POSTS', title: '投稿・写真の運用代行', body: '新メニューやキャンペーンを定期投稿。鮮度の高いプロフィールを保ち、表示機会を増やします。' },\n        { en: 'REVIEWS', title: '口コミ管理・返信代行', body: '全口コミへ丁寧に返信。口コミを増やす仕組みづくりもサポートします。違反行為は一切行いません。' },\n        { en: 'TRACKING', title: '順位・効果の自動計測', body: 'キーワード×エリアごとの地図順位を毎日計測。閲覧数や経路検索などの行動データも記録します。' },\n        { en: 'REPORT', title: '毎月のレポート＆提案', body: '専門用語を使わないわかりやすいレポートで成果を共有。次月の改善アクションまで提案します。' },\n        { en: 'SUPPORT', title: '専任担当の伴走サポート', body: '店舗ごとに専任担当がつき、チャット・メールでいつでも相談可能。商圏に合わせて運用を調整します。' },\n      ],\n      industries: ['飲食店', '美容室・サロン', 'クリニック・医院', '小売店', '士業・オフィス系'],\n      steps: [\n        { no: '01', title: '資料請求・無料相談', body: 'フォームから資料をご請求ください。オンラインでの無料相談も承ります。' },\n        { no: '02', title: '現状調査とご提案', body: '検索順位や競合を調査し、お店に合ったプランと改善ポイントをご提案します。' },\n        { no: '03', title: '初期設定・整備', body: 'プロフィール登録・情報整備・写真の最適化など、集客の土台を整えます。' },\n        { no: '04', title: '運用スタート', body: '投稿・口コミ返信・計測を継続運用。毎月のレポートで成果を確認します。' },\n      ],\n      faqs: faqsData.map(([q, a], i) => ({\n        q, a,\n        open: this.state.openFaq === i,\n        mark: this.state.openFaq === i ? '−' : '+',\n        toggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i })),\n      })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

<script>
// MEO LP contact form -> /api/contact (same-origin, Resend)
// NOTE: DCLogic runtime intercepts <form> submit, so we bind the submit BUTTON's
// click event in the capture phase instead. Verified: submit never fires; click does.
(function () {
  var SENT = false;

  function findForm() {
    return document.getElementById('meoContactForm');
  }

  function bind() {
    var form = findForm();
    if (!form) return;
    var btn = form.querySelector('button[type=submit]');
    if (!btn || btn.dataset.meoBound) return;
    btn.dataset.meoBound = '1';
    btn.addEventListener('click', onClick, true); // capture phase
  }

  async function onClick(e) {
    e.preventDefault();
    e.stopPropagation();
    if (SENT) return;

    var form = findForm();
    if (!form) return;
    var btn = e.currentTarget;

    var get = function (n) {
      var el = form.querySelector('[name=' + n + ']');
      return el ? String(el.value || '').trim() : '';
    };

    var company = get('company');
    var name = get('name');
    var email = get('email');
    var message = get('message');
    var industry = get('industry');

    clearError(form);

    var missing = [];
    if (!company) missing.push('会社名・店舗名');
    if (!name) missing.push('お名前');
    if (!email) missing.push('メールアドレス');
    if (!message) missing.push('ご相談内容');
    if (missing.length) {
      showError(form, missing.join('、') + 'を入力してください。');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError(form, 'メールアドレスの形式が正しくありません。');
      return;
    }

    SENT = true;
    var original = btn.textContent;
    btn.disabled = true;
    btn.textContent = '送信中...';

    var payload = {
      company: company,
      name: name,
      email: email,
      message: '【MEOローカル集客 資料請求】\n業種: ' + (industry || '未選択') + '\n\n' + message
    };

    try {
      var res = await fetch('/api/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var data = await res.json().catch(function () { return {}; });
      if (!res.ok) throw new Error(data.error || '送信に失敗しました。');
      showThanks(form);
    } catch (err) {
      SENT = false;
      btn.disabled = false;
      btn.textContent = original;
      showError(form, (err && err.message) || '送信に失敗しました。時間をおいて再度お試しください。');
    }
  }

  function clearError(form) {
    var box = form.querySelector('.meo-error');
    if (box) box.remove();
  }

  function showError(form, msg) {
    clearError(form);
    var box = document.createElement('p');
    box.className = 'meo-error';
    box.style.cssText = 'font-size:12.5px;color:#B42318;background:#FEF3F2;border:1px solid #FDA29B;border-radius:8px;padding:10px 12px;margin:0;';
    box.textContent = msg;
    form.insertBefore(box, form.firstChild);
  }

  function showThanks(form) {
    var card = form.parentElement;
    if (!card) return;
    card.innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;min-height:360px;">' +
        '<span style="width:52px;height:52px;border-radius:999px;background:#EEEDFE;color:#4338F0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;">&#10003;</span>' +
        '<h3 style="font-weight:900;font-size:22px;color:#101828;">ありがとうございます！</h3>' +
        '<p style="font-size:14px;color:#475467;line-height:1.9;">資料請求を受け付けました。<br>担当者より2営業日以内にご連絡いたします。</p>' +
      '</div>';
  }

  if (document.readyState !== 'loading') bind();
  document.addEventListener('DOMContentLoaded', bind);
  var obs = new MutationObserver(bind);
  obs.observe(document.documentElement, { childList: true, subtree: true });
  setTimeout(function () { obs.disconnect(); }, 60000);
})();
</script>
<script>
(function () {
  function tag() {
    document.querySelectorAll('*').forEach(function (el) {
      var s = getComputedStyle(el);
      var inline = el.getAttribute('style') || '';
      if (s.display.indexOf('grid') !== -1) {
        var m = inline.match(/grid-template-columns:\s*([^;]+)/);
        var v = m ? m[1].trim() : '';
        if (v === '1fr 70px 50px') {
          el.classList.add('rwd-rank');
        } else {
          var cols = s.gridTemplateColumns.split(' ').filter(function (x) { return x && x !== '0px'; });
          if (cols.length > 1) el.classList.add('rwd-stack');
        }
      }
      if (/padding:\s*(88px|96px)/.test(inline)) el.classList.add('rwd-pad');
      if (/padding:\s*(40px 36px|28px 24px)/.test(inline)) el.classList.add('rwd-card');
      if (/gap:\s*(48px|56px|64px)/.test(inline)) el.classList.add('rwd-gap');
      if (/position:\s*absolute/.test(inline)) el.classList.add('rwd-abs');
    });
  }
  if (document.readyState !== 'loading') tag();
  document.addEventListener('DOMContentLoaded', tag);
  var mo = new MutationObserver(tag);
  mo.observe(document.documentElement, { childList: true, subtree: true });
  setTimeout(function () { mo.disconnect(); }, 8000);
})();
</script>


<script>
(function () {
  var TURNS = 3;           // 4枚 = 3回めくる
  var MAX_DEG = 168;       // めくり切る角度
  var STYLE_ID = 'inboundFlipStyle';
  var root = null, cards = [], dots = [], raf = 0;

  var CSS = [
    '#inboundFlip{width:100%!important;min-height:260vh!important;',
    'position:relative!important;display:block!important;}',
    '#inboundFlip .flip-stage{position:sticky!important;top:12vh!important;',
    'width:100%!important;max-width:1000px!important;margin:0 auto!important;',
    'aspect-ratio:1456/1092;perspective:1800px;display:block!important;}',
    '#inboundFlip .flip-card{position:absolute!important;inset:0!important;',
    'margin:0!important;transform-origin:left center!important;',
    'transform-style:preserve-3d;border-radius:14px;overflow:hidden;',
    'border:1px solid #EAECF0;background:#FDFCF7;',
    'box-shadow:0 18px 40px -18px rgba(16,24,40,.35);will-change:transform;}',
    '#inboundFlip .flip-card img{width:100%!important;height:100%!important;',
    'max-width:none!important;object-fit:cover!important;display:block!important;',
    'margin:0!important;border:0!important;border-radius:0!important;',
    'backface-visibility:hidden;}',
    '#inboundFlip .flip-dots{position:sticky!important;top:calc(12vh + 8px);',
    'display:flex!important;gap:8px;justify-content:center;margin-top:18px;}',
    '#inboundFlip .flip-dot{width:7px;height:7px;border-radius:999px;',
    'background:#D0D5DD;transition:background .2s ease,transform .2s ease;}',
    '#inboundFlip .flip-dot.is-on{background:#4338F0;transform:scale(1.25);}',
    '@media (max-width:900px){#inboundFlip{min-height:200vh!important;}',
    '#inboundFlip .flip-stage{top:16vh!important;perspective:1100px;}}',
    '@media (prefers-reduced-motion:reduce){',
    '#inboundFlip{min-height:0!important;}',
    '#inboundFlip .flip-stage{position:static!important;aspect-ratio:auto;}',
    '#inboundFlip .flip-card{position:static!important;transform:none!important;',
    'margin-bottom:16px!important;}}'
  ].join('');

  // DCLogic は body 配下のノードを掃除するため、head に入れて生き残らせる
  function ensureStyle() {
    if (document.getElementById(STYLE_ID)) return;
    var st = document.createElement('style');
    st.id = STYLE_ID;
    st.textContent = CSS;
    (document.head || document.documentElement).appendChild(st);
  }

  function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }

  function render() {
    raf = 0;
    if (!root) return;
    var r = root.getBoundingClientRect();
    var vh = window.innerHeight || 1;
    var total = r.height - vh;
    var p = total > 0 ? clamp(-r.top / total, 0, 1) : 0;
    var turned = p * TURNS;

    for (var i = 0; i < cards.length; i++) {
      var t = clamp(turned - i, 0, 1);
      cards[i].style.transform = 'rotateY(' + (-MAX_DEG * t) + 'deg)';
      cards[i].style.opacity = t > 0.94 ? '0' : '1';
      cards[i].style.zIndex = String(cards.length - i);
    }
    var active = clamp(Math.round(turned), 0, cards.length - 1);
    for (var j = 0; j < dots.length; j++) {
      dots[j].classList.toggle('is-on', j === active);
    }
  }

  function onScroll() {
    if (!raf) raf = requestAnimationFrame(render);
  }

  function bind() {
    ensureStyle();   // 消されていたら毎回入れ直す
    var el = document.getElementById('inboundFlip');
    if (!el) return;
    var stage = el.querySelector('.flip-stage');
    if (!stage) return;
    if (el.dataset.flipBound === '1' && root === el) return;

    el.dataset.flipBound = '1';
    root = el;
    cards = Array.prototype.slice.call(stage.querySelectorAll('.flip-card'));
    dots = Array.prototype.slice.call(el.querySelectorAll('.flip-dot'));

    window.removeEventListener('scroll', onScroll);
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    render();
  }

  ensureStyle();
  document.addEventListener('DOMContentLoaded', bind);
  var obs = new MutationObserver(bind);
  obs.observe(document.documentElement, { childList: true, subtree: true });
  setTimeout(function () { obs.disconnect(); }, 60000);
})();
</script>
</body>
